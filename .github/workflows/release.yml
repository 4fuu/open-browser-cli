name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. 0.2.0 or v0.2.0)"
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Compute build version
        shell: bash
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
          echo "BUILD_VERSION=${{ inputs.version }} ($SHORT_SHA)" >> "$GITHUB_ENV"

      - name: Install musl-tools (x86_64 Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools

      - name: Install cross (aarch64 Linux musl)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        env:
          BROWSER_CLI_VERSION: ${{ env.BUILD_VERSION }}
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          BIN="target/${{ matrix.target }}/release/browser-cli"
          ARCHIVE="browser-cli-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname $BIN)" "$(basename $BIN)"
          echo "ASSET=$ARCHIVE" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\browser-cli.exe"
          $archive = "browser-cli-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          echo "ASSET=$archive" >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  extension:
    name: Build browser extension packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Sync extension versions
        env:
          VERSION: ${{ inputs.version }}
        run: |
          VER="${VERSION#v}"
          echo "CHROME_EXTENSION_ASSET=browser-cli-extension-chrome-${VER}.zip" >> $GITHUB_ENV
          echo "FIREFOX_EXTENSION_ASSET=browser-cli-extension-firefox-${VER}.xpi" >> $GITHUB_ENV
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION.replace(/^v/, '');

          const writeJson = (path, update) => {
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            update(data);
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
          };

          writeJson('extension/manifest.json', (data) => {
            data.version = version;
          });
          writeJson('extension/package.json', (data) => {
            data.version = version;
          });
          writeJson('extension/package-lock.json', (data) => {
            data.version = version;
            if (data.packages && data.packages['']) {
              data.packages[''].version = version;
            }
          });
          NODE

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Build Chrome extension zip
        continue-on-error: true
        run: |
          cd extension
          npm run pack
          cp "dist/browser-cli-extension.zip" "../${CHROME_EXTENSION_ASSET}"

      - name: Build signed Firefox extension
        continue-on-error: true
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          if [ -z "${WEB_EXT_API_KEY:-}" ]; then
            echo "::error::Missing GitHub Actions secret WEB_EXT_API_KEY"
            exit 1
          fi
          if [ -z "${WEB_EXT_API_SECRET:-}" ]; then
            echo "::error::Missing GitHub Actions secret WEB_EXT_API_SECRET"
            exit 1
          fi
          cd extension
          npm run build
          npx web-ext sign \
            --channel=unlisted \
            --no-input \
            --source-dir dist/firefox \
            --artifacts-dir dist/firefox-signed \
            --api-key "$WEB_EXT_API_KEY" \
            --api-secret "$WEB_EXT_API_SECRET"
          SIGNED_XPI="$(find dist/firefox-signed -maxdepth 1 -type f -name '*.xpi' | head -n 1)"
          if [ -z "$SIGNED_XPI" ]; then
            echo "::error::web-ext did not produce a signed .xpi"
            exit 1
          fi
          cp "$SIGNED_XPI" "../${FIREFOX_EXTENSION_ASSET}"

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: browser-extension-packages
          path: |
            browser-cli-extension-chrome-*.zip
            browser-cli-extension-firefox-*.xpi
          if-no-files-found: warn

  release:
    name: Create Release & Update Manifests
    needs: [build, extension]
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Compute release title suffix
        shell: bash
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
          echo "RELEASE_TITLE=${{ inputs.version }} ($SHORT_SHA)" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" \
            --title "${{ env.RELEASE_TITLE }}" \
            --generate-notes \
            artifacts/*

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          sha256() { sha256sum "$1" | awk '{print $1}'; }
          echo "win_x86=$(sha256 artifacts/browser-cli-x86_64-pc-windows-msvc.zip)" >> $GITHUB_OUTPUT
          echo "linux_x86=$(sha256 artifacts/browser-cli-x86_64-unknown-linux-musl.tar.gz)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(sha256 artifacts/browser-cli-aarch64-unknown-linux-musl.tar.gz)" >> $GITHUB_OUTPUT
          echo "macos_x86=$(sha256 artifacts/browser-cli-x86_64-apple-darwin.tar.gz)" >> $GITHUB_OUTPUT
          echo "macos_arm64=$(sha256 artifacts/browser-cli-aarch64-apple-darwin.tar.gz)" >> $GITHUB_OUTPUT

      - name: Update Scoop manifest
        env:
          VERSION: ${{ inputs.version }}
          WIN_X86: ${{ steps.hashes.outputs.win_x86 }}
        run: |
          VER="${VERSION#v}"
          sed -i "s|\"version\": \".*\"|\"version\": \"$VER\"|" bucket/browser-cli.json
          sed -i -E "s|/download/[^/]*/|/download/$VERSION/|g" bucket/browser-cli.json
          sed -i "s|\"hash\": \".*\"|\"hash\": \"$WIN_X86\"|" bucket/browser-cli.json

      - name: Update Homebrew formula
        env:
          VERSION: ${{ inputs.version }}
          MACOS_ARM64: ${{ steps.hashes.outputs.macos_arm64 }}
          MACOS_X86: ${{ steps.hashes.outputs.macos_x86 }}
          LINUX_ARM64: ${{ steps.hashes.outputs.linux_arm64 }}
          LINUX_X86: ${{ steps.hashes.outputs.linux_x86 }}
        run: |
          VER="${VERSION#v}"
          sed -i "s|version \".*\"|version \"$VER\"|" Formula/browser-cli.rb
          sed -i -E "s|/download/[^/]*/|/download/$VERSION/|g" Formula/browser-cli.rb
          sed -i "s|sha256 \".*\" # macos_arm64|sha256 \"$MACOS_ARM64\" # macos_arm64|" Formula/browser-cli.rb
          sed -i "s|sha256 \".*\" # macos_x86|sha256 \"$MACOS_X86\" # macos_x86|" Formula/browser-cli.rb
          sed -i "s|sha256 \".*\" # linux_arm64|sha256 \"$LINUX_ARM64\" # linux_arm64|" Formula/browser-cli.rb
          sed -i "s|sha256 \".*\" # linux_x86|sha256 \"$LINUX_X86\" # linux_x86|" Formula/browser-cli.rb

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/browser-cli.json Formula/browser-cli.rb
          git commit -m "chore: update manifests to ${{ inputs.version }}"
          git push
